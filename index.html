<!DOCTYPE html>

    .s-off { background: #F8FAFC; color: #94A3B8; }

    .btn-del    { background: #FFF5F5; color: #EF4444; border: 1px solid #FEE2E2; }

<script>
window.onerror = function(msg, src, line, col, err) {
  var box = document.getElementById('error-box');
  if (box) { box.style.display = 'block'; box.textContent = 'エラー: ' + msg + '\n' + (src||'') + ':' + line; }
};
window.onunhandledrejection = function(e) {
  var box = document.getElementById('error-box');
  if (box) { box.style.display = 'block'; box.textContent = 'Promise エラー: ' + (e.reason || e); }

<script type="text/babel" data-presets="react">
/* ===== 設定 ===== */
const CLIENT_ID = "02da59cd-2903-4cdb-b519-4df3ecf79bcb";
const TENANT_ID = "f0796f06-778d-4183-b5d9-4cce701de452";
const SITE_NAME = "enjoint-kanri";
const LIST_NAME = "受給者証・契約 対応状況確認表";
const HOSTNAME  = "enjoint.sharepoint.com";
const SCOPES    = ["Sites.ReadWrite.All", "User.Read"];

const COLS_D = "130px 68px 54px 54px 62px minmax(90px,1fr) 56px 54px 106px minmax(90px,1fr) 66px 62px 56px 56px 52px";
const TYPES  = ["", "新規", "引き継ぎ"];

/* ===== MSAL ===== */
let msalInstance;
try {
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: CLIENT_ID,
      authority: "https://login.microsoftonline.com/" + TENANT_ID,
      redirectUri: window.location.href.split("?")[0].split("#")[0],
    },
    cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: true },
  });
} catch(e) {
  document.getElementById('error-box').style.display = 'block';
  document.getElementById('error-box').textContent = 'MSAL初期化エラー: ' + e.message;
}

/* ===== Graph API ===== */
async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error("未ログイン");
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch(e) {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  }
}

async function apiFetch(token, url, opts) {
  const base = "https://graph.microsoft.com/v1.0";
  const res = await fetch(base + url, {
    ...opts,
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json", ...(opts&&opts.headers) }
  });
  if (opts && opts.method === "DELETE") return null;
  return res.json();
}

async function getSiteId(token) {
  const d = await apiFetch(token, "/sites/" + HOSTNAME + ":/sites/" + SITE_NAME);
  return d.id;
}

async function getListId(token, siteId) {
  const d = await apiFetch(token, "/sites/" + siteId + "/lists?$filter=displayName eq '" + encodeURIComponent(LIST_NAME) + "'");
  return d.value && d.value[0] && d.value[0].id;
}

function fieldsToRecord(item) {
  const f = item.fields || {};
  return {
    id:           item.id,
    name:         f["名前"]          || f["Title"] || "",
    area:         f["市町村"]         || "",
    type:         f["種別"]           || "",
    cityMeeting:  !!f["市役所面談"],
    scheduleDate: f["契約予定日"]     || "",
    memo1:        f["備考①"]          || "",
    contracted:   !!f["契約完了"],
    changeNotice: !!f["変更届"],
    planApp:      !!f["計画案等提出"],
    memo2:        f["備考②"]          || "",
    received:     !!f["受給者証受取"],
    meetingHeld:  f["担当者会議日程"] || "",
    planSubmit:   !!f["計画書提出"],
    aura:         !!f["AURA取込"],
  };
}

function recordToFields(r) {
  return {
    Title: r.name, "名前": r.name, "市町村": r.area, "種別": r.type,
    "市役所面談": r.cityMeeting, "契約予定日": r.scheduleDate, "備考①": r.memo1,
    "契約完了": r.contracted, "変更届": r.changeNotice, "計画案等提出": r.planApp,
    "備考②": r.memo2, "受給者証受取": r.received, "担当者会議日程": r.meetingHeld,
    "計画書提出": r.planSubmit, "AURA取込": r.aura,
  };
}

async function fetchItems(token, siteId, listId) {
  const d = await apiFetch(token, "/sites/" + siteId + "/lists/" + listId + "/items?expand=fields&$top=500");
  return (d.value || []).map(fieldsToRecord);
}

async function createItem(token, siteId, listId, record) {
  return apiFetch(token, "/sites/" + siteId + "/lists/" + listId + "/items", {
    method: "POST", body: JSON.stringify({ fields: recordToFields(record) })
  });
}

async function updateItem(token, siteId, listId, itemId, record) {
  return apiFetch(token, "/sites/" + siteId + "/lists/" + listId + "/items/" + itemId + "/fields", {
    method: "PATCH", body: JSON.stringify(recordToFields(record))
  });
}

async function deleteItem(token, siteId, listId, itemId) {
  return apiFetch(token, "/sites/" + siteId + "/lists/" + listId + "/items/" + itemId, { method: "DELETE" });
}

/* ===== ユーティリティフック ===== */
function useIsMobile() {
  const [v, setV] = React.useState(window.innerWidth <= 768);
  React.useEffect(() => {
    const h = () => setV(window.innerWidth <= 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return v;
}

function useToast() {
  const [msg, setMsg] = React.useState("");
  const show = m => { setMsg(m); setTimeout(() => setMsg(""), 2500); };
  const el = msg ? React.createElement("div", { className: "toast" }, msg) : null;
  return [el, show];
}

  const lblCls = "chk-lbl" + (!disabled && checked ? (isPurple ? " purple" : " blue") : "");
  if (mobile) {
    return (
      React.createElement("div", { className: cls, onClick: () => !disabled && onChange(!checked) },
        React.createElement("input", { type: "checkbox", checked: !!checked, readOnly: true, disabled, style: { width:22, height:22, accentColor: color||"#2563EB", flexShrink:0 } }),
        React.createElement("span", { className: lblCls },
          label, note && React.createElement("span", { className: "chk-note" }, note)
        )
      )

    React.createElement("label", { className: cls },
      React.createElement("input", { type: "checkbox", checked: !!checked, onChange: e => !disabled && onChange(e.target.checked), disabled, style: { width:18, height:18, accentColor: color||"#2563EB", marginTop:1, flexShrink:0 } }),
      React.createElement("span", { className: lblCls },

}

    ),
    React.createElement("div", { className:"card-actions" },
      React.createElement("button",{className:"btn-edit",onClick:onEdit},"✏️ 編集"),
      React.createElement("button",{className:"btn-del",onClick:onDelete},"🗑 削除")
    )
  );
}

/* ===== DisplayCheck（デスクトップ用） ===== */
function DisplayCheck({ checked, disabled }) {
  if (disabled) return React.createElement("div",{style:{display:"flex",justifyContent:"center"}},
    React.createElement("div",{style:{width:22,height:22,borderRadius:5,border:"1.5px solid #E2E8F0",background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center"}},
      React.createElement("span",{style:{color:"#D1D5DB",fontSize:10}},"—")));
  return React.createElement("div",{style:{display:"flex",justifyContent:"center"}},
    React.createElement("div",{style:{width:22,height:22,borderRadius:5,border:`2px solid ${checked?"#2563EB":"#CBD5E1"}`,background:checked?"#2563EB":"#fff",display:"flex",alignItems:"center",justifyContent:"center"}},
      checked&&React.createElement("span",{style:{color:"#fff",fontSize:13,lineHeight:1}},"✓")));
}

/* ===== メインApp ===== */
function App() {
  const isMobile = useIsMobile();
  const [toastEl, showToast] = useToast();
  const [authState, setAuthState] = React.useState("loading");
  const [userName,  setUserName]  = React.useState("");
  const [siteId,    setSiteId]    = React.useState(null);
  const [listId,    setListId]    = React.useState(null);
  const [records,   setRecords]   = React.useState([]);
  const [filterName,  setFilterName]  = React.useState("");
  const [filterArea,  setFilterArea]  = React.useState("");
  const [filterMonth, setFilterMonth] = React.useState("");
  const [modal,   setModal]   = React.useState(null);
  const [saving,  setSaving]  = React.useState(false);
  const [loading, setLoading] = React.useState(false);

  const loadData = async () => {
    setLoading(true);
    try {
      const token = await getToken();
      const sid = await getSiteId(token);
      const lid = await getListId(token, sid);
      setSiteId(sid); setListId(lid);
      setRecords(await fetchItems(token, sid, lid));
    } catch(e) { console.error(e); showToast("データ取得失敗: " + e.message); }
    setLoading(false);
  };

  React.useEffect(() => {
    (async () => {
      try {
        await msalInstance.handleRedirectPromise();
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          setUserName(accounts[0].name || accounts[0].username);
          await loadData();
          setAuthState("app");
        } else {
          setAuthState("login");
        }
      } catch(e) {
        console.error("認証エラー:", e);
        setAuthState("login");
      }
    })();
  }, []);

  const handleLogin  = () => msalInstance.loginRedirect({ scopes: SCOPES });
  const handleLogout = () => msalInstance.logoutRedirect();

  const handleSave = async form => {
    setSaving(true);
    try {
      const token = await getToken();
      if (modal === "new") {
        const res = await createItem(token, siteId, listId, form);
        setRecords(prev => [...prev, { ...form, id: res.id }]);
      } else {
        await updateItem(token, siteId, listId, modal.id, form);
        setRecords(prev => prev.map(r => r.id === modal.id ? { ...form, id: r.id } : r));
      }
      showToast("✓ 保存しました"); setModal(null);
    } catch(e) { showToast("保存失敗: " + e.message); }
    setSaving(false);
  };

  const handleDelete = async id => {
    if (!window.confirm("削除しますか？")) return;
    try {
      const token = await getToken();
      await deleteItem(token, siteId, listId, id);
      setRecords(prev => prev.filter(r => r.id !== id));
      showToast("削除しました");
    } catch(e) { showToast("削除失敗: " + e.message); }
  };

  const exportExcel = () => {
    const ws = XLSX.utils.json_to_sheet(records.map(r => ({
      名前:r.name, 市町村:r.area, 種別:r.type,
      市役所面談:r.type==="新規"?(r.cityMeeting?"✓":""):"―",
      契約予定日:r.scheduleDate, 備考:r.memo1,
      契約完了:r.contracted?"✓":"",
      変更届:r.type==="引き継ぎ"?(r.changeNotice?"✓":""):"―",
      "計画案等書類":r.type==="新規"?(r.planApp?"✓":""):"―",
      備考2:r.memo2, 受給者証受取:r.received?"✓":"",
      担当者会議日程:r.type==="新規"?(r.meetingHeld||""):"―",
      計画書提出:r.type==="新規"?(r.planSubmit?"✓":""):"―",
      AURA取込:r.aura?"✓":"",
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "確認表");
    XLSX.writeFile(wb, "受給者証・契約 対応状況確認表.xlsx");
  };

  if (authState === "loading") return React.createElement("div", { id:"loading-box" },
    React.createElement("div",{style:{fontSize:32}},"⏳"), React.createElement("div",null,"読み込み中..."));

  if (authState === "login") return React.createElement("div", { className:"login-screen" },
    React.createElement("div", { className:"login-box" },
      React.createElement("div",{style:{fontSize:48}},"📋"),
      React.createElement("h2",null,"エンジョイント",React.createElement("br"),"クライアント進捗確認リスト"),
      React.createElement("p",null,"会社のMicrosoftアカウントでログインしてください"),
      React.createElement("button",{className:"btn-ms",onClick:handleLogin},
        React.createElement("svg",{width:20,height:20,viewBox:"0 0 21 21",fill:"none"},
          React.createElement("rect",{x:1,y:1,width:9,height:9,fill:"#F25022"}),
          React.createElement("rect",{x:11,y:1,width:9,height:9,fill:"#7FBA00"}),
          React.createElement("rect",{x:1,y:11,width:9,height:9,fill:"#00A4EF"}),
          React.createElement("rect",{x:11,y:11,width:9,height:9,fill:"#FFB900"})
        ),
        "Microsoftアカウントでログイン"
      )
    )
  );

  const filtered = records.filter(r =>
    (!filterArea||r.area.includes(filterArea)) &&
    (!filterName||r.name.includes(filterName)) &&
    (!filterMonth||r.scheduleDate.startsWith(filterMonth))
  );
  const total=records.length, cont=records.filter(r=>r.contracted).length,
        recv=records.filter(r=>r.received).length, aura=records.filter(r=>r.aura).length,
        meet=records.filter(r=>r.meetingHeld).length;

  const HDR=[
    {l:"名前"},{l:"市町村"},{l:"種別"},
    {l:"市役所\n面談",n:"新規",nc:"#60A5FA"},{l:"契約予定日"},{l:"備考"},{l:"契約完了"},
    {l:"変更届",n:"引継",nc:"#A78BFA"},{l:"計画案等書類\n支給申請書等",n:"新規",nc:"#60A5FA"},
    {l:"備考"},{l:"受給者証\n受取"},{l:"担当者会議\n日程",n:"新規",nc:"#60A5FA"},
    {l:"計画書\nの提出",n:"新規",nc:"#60A5FA"},{l:"AURA\n取込"},{l:""},
  ];

  return React.createElement("div", { style:{minHeight:"100vh",background:"#F0F4FA"} },
    toastEl,
    /* ヘッダー */
    React.createElement("div",{style:{background:"linear-gradient(135deg,#1E3A5F 0%,#2563EB 100%)",padding:isMobile?"14px 14px 12px":"18px 16px 16px",color:"#fff"}},
      React.createElement("div",{style:{maxWidth:1500,margin:"0 auto"}},
        React.createElement("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}},
          React.createElement("div",null,
            React.createElement("p",{style:{margin:0,fontSize:10,opacity:0.7,letterSpacing:2}},"エンジョイント"),
            React.createElement("h1",{style:{margin:"3px 0 0",fontSize:isMobile?14:17,fontWeight:700,lineHeight:1.4}},"状況確認リスト（契約日・書類提出・受給者証受領等）")
          ),
          React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}},
            React.createElement("span",{style:{fontSize:11,opacity:0.8}},userName),
            React.createElement("button",{onClick:handleLogout,style:{fontSize:11,background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",padding:"3px 10px",borderRadius:20,cursor:"pointer"}},"ログアウト")
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}},
          [["対象者",total,"rgba(255,255,255,0.15)"],["契約完了",cont,"rgba(110,231,183,0.25)"],["受取済",recv,"rgba(110,231,183,0.25)"],["担当者会議",meet,"rgba(196,181,253,0.3)"],["AURA取込",aura,"rgba(147,197,253,0.3)"]].map(([label,val,bg])=>
            React.createElement("div",{key:label,style:{background:bg,borderRadius:10,padding:"6px 12px",textAlign:"center",minWidth:52}},
              React.createElement("div",{style:{fontSize:18,fontWeight:700}},val),
              React.createElement("div",{style:{fontSize:10,opacity:0.85}},label)))
        )
      )
    ),
    /* コンテンツ */
    React.createElement("div",{style:{maxWidth:1500,margin:"0 auto",padding:isMobile?"12px 12px 40px":"14px 12px 40px"}},
      React.createElement("div",{className:"filter-bar"},
        React.createElement("input",{value:filterName,onChange:e=>setFilterName(e.target.value),placeholder:"🔍 名前で検索"}),
        React.createElement("input",{value:filterArea,onChange:e=>setFilterArea(e.target.value),placeholder:"🗺 市町村で検索"}),
        React.createElement("input",{value:filterMonth,onChange:e=>setFilterMonth(e.target.value),placeholder:"📅 契約月で検索 例:5"}),
        React.createElement("button",{onClick:exportExcel,className:"btn-excel"},"📥 Excel出力"),
        React.createElement("button",{onClick:loadData,style:{padding:"11px 14px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",border:"1.5px solid #2563EB",background:"#EFF6FF",color:"#2563EB"}},"🔄 更新"),
        React.createElement("button",{onClick:()=>setModal("new"),className:"btn-add"},"＋ 新規追加")
      ),
      loading && React.createElement("div",{style:{textAlign:"center",padding:32,color:"#94A3B8"}},"読み込み中..."),
      /* モバイルカード */
      React.createElement("div",{className:"mobile-only"},
        !loading&&filtered.length===0&&React.createElement("div",{style:{padding:32,textAlign:"center",color:"#94A3B8",background:"#fff",borderRadius:14}},"該当なし"),
        filtered.map(r=>React.createElement(RecordCard,{key:r.id,r,onEdit:()=>setModal(r),onDelete:()=>handleDelete(r.id)}))
      ),
      /* デスクトップテーブル */
      React.createElement("div",{className:"desktop-only",style:{borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,0.08)",overflowX:"auto"}},
        React.createElement("div",{style:{minWidth:1100}},
          React.createElement("div",{style:{display:"grid",gridTemplateColumns:COLS_D,background:"#1E3A5F",padding:"0 8px"}},
            HDR.map((h,i)=>React.createElement("div",{key:i,style:{padding:"9px 4px",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.35,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#CBD5E1"}},
              React.createElement("span",null,h.l),
              h.n&&React.createElement("span",{style:{fontSize:9,color:h.nc,fontWeight:700,marginTop:1}},"▶"+h.n)))
          ),
          !loading&&filtered.length===0&&React.createElement("div",{style:{padding:32,textAlign:"center",color:"#94A3B8",background:"#fff"}},"該当なし"),
          filtered.map((r,i)=>{
            const done=r.contracted&&r.received&&r.aura, isHK=r.type==="引き継ぎ", isSN=r.type==="新規";
            const bg=done?"#F0FDF4":i%2===0?"#fff":"#FAFBFC";
            return React.createElement("div",{key:r.id,style:{display:"grid",gridTemplateColumns:COLS_D,padding:"8px",alignItems:"start",borderBottom:"1px solid #F1F5F9",background:bg}},
              React.createElement("span",{style:{fontSize:13,fontWeight:600,color:"#1E293B",paddingTop:2}},r.name),
              React.createElement("span",{style:{fontSize:12,color:"#475569",paddingTop:2}},r.area),
              React.createElement("div",{style:{paddingTop:1}},React.createElement("span",{style:{fontSize:11,fontWeight:700,color:r.type==="新規"?"#2563EB":r.type==="引き継ぎ"?"#7C3AED":"#CBD5E1",background:r.type==="新規"?"#EFF6FF":r.type==="引き継ぎ"?"#F5F3FF":"transparent",borderRadius:6,padding:r.type?"2px 4px":0,display:"inline-block"}},r.type||"—")),
              React.createElement("div",{style:{paddingTop:3}},React.createElement(DisplayCheck,{checked:r.cityMeeting,disabled:!isSN})),
              React.createElement("span",{style:{fontSize:12,color:"#64748B",textAlign:"center",paddingTop:2}},r.scheduleDate),
              React.createElement("span",{style:{fontSize:12,color:"#64748B",whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.5}},r.memo1),
              React.createElement("div",{style:{paddingTop:3}},React.createElement(DisplayCheck,{checked:r.contracted})),
              React.createElement("div",{style:{paddingTop:3}},React.createElement(DisplayCheck,{checked:r.changeNotice,disabled:!isHK})),
              React.createElement("div",{style:{paddingTop:3}},React.createElement(DisplayCheck,{checked:r.planApp,disabled:!isSN})),
              React.createElement("span",{style:{fontSize:12,color:"#64748B",whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.5}},r.memo2),
              React.createElement("div",{style:{paddingTop:3}},React.createElement(DisplayCheck,{checked:r.received})),
              React.createElement("div",{style:{paddingTop:3,display:"flex",justifyContent:"center"}},
                isSN?React.createElement("span",{style:{fontSize:12,color:r.meetingHeld?"#64748B":"#CBD5E1",textAlign:"center"}},r.meetingHeld||"—"):React.createElement("span",{style:{fontSize:11,color:"#D1D5DB"}},"—")),
              React.createElement("div",{style:{paddingTop:3}},React.createElement(DisplayCheck,{checked:r.planSubmit,disabled:!isSN})),
              React.createElement("div",{style:{paddingTop:3}},React.createElement(DisplayCheck,{checked:r.aura})),
              React.createElement("span",{style:{display:"flex",gap:4,paddingTop:1}},
                React.createElement("button",{onClick:()=>setModal(r),style:{padding:"5px 8px",borderRadius:6,border:"1px solid #BFDBFE",background:"#EFF6FF",cursor:"pointer",fontSize:14,lineHeight:1}},"✏️"),
                React.createElement("button",{onClick:()=>handleDelete(r.id),style:{padding:"5px 8px",borderRadius:6,border:"1px solid #FEE2E2",background:"#FFF5F5",cursor:"pointer",fontSize:14,lineHeight:1}},"🗑"))
            );
          })
        )
      ),
      React.createElement("p",{style:{textAlign:"center",fontSize:12,color:"#94A3B8",marginTop:12}},
        filtered.length+"件表示 / 全"+records.length+"件　｜　データはSharePointに保存されます")
    ),
    modal&&React.createElement(Modal,{record:modal==="new"?null:modal,onClose:()=>setModal(null),onSave:handleSave,isMobile,saving})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
