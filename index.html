<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>状況確認リスト</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; background: #F0F4FA; }
    /* iOS Safari: font-size < 16px のinputはズームされて入力不能になる → 全て16px以上 */
    input, textarea, select, button { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; touch-action: manipulation; }
    .desktop-only { display: block; }
    .mobile-only  { display: none; }
    @media (max-width: 768px) {
      .desktop-only { display: none !important; }
      .mobile-only  { display: block !important; }
    }
    /* エラー表示 */
    #err { display: none; position: fixed; top: 0; left: 0; right: 0; background: #FEF2F2; border-bottom: 3px solid #EF4444; padding: 10px 16px; font-size: 13px; color: #991B1B; z-index: 9999; white-space: pre-wrap; word-break: break-all; }
    /* ローディング */
    .loading-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: #64748B; }
    /* ログイン */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#1E3A5F,#2563EB); padding: 16px; }
    .login-box { background: #fff; border-radius: 20px; padding: 40px 28px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-box h2 { color: #1E3A5F; font-size: 18px; margin: 16px 0 8px; line-height: 1.5; }
    .login-box p  { color: #64748B; font-size: 14px; margin: 0 0 28px; }
    .btn-ms { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #2563EB; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    /* カード */
    .record-card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #E2E8F0; }
    .record-card.done { border-left-color: #22C55E; background: #F0FDF4; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .card-name { font-size: 17px; font-weight: 700; color: #1E293B; }
    .card-sub  { font-size: 13px; color: #64748B; margin-top: 2px; }
    .type-badge { font-size: 12px; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
    .type-shinki    { color: #2563EB; background: #EFF6FF; }
    .type-hikitsugi { color: #7C3AED; background: #F5F3FF; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
    .si { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    .si-on  { background: #EFF6FF; color: #2563EB; }
    .si-off { background: #F8FAFC; color: #94A3B8; }
    .si-dis { background: #F1F5F9; color: #CBD5E1; }
    .si-pur { background: #F5F3FF; color: #7C3AED; }

    .sd-on  { background: #2563EB; }
    .sd-off { background: #CBD5E1; }
    .sd-pur { background: #7C3AED; }

    .btn-edit { background: #EFF6FF; color: #2563EB; border: 1.5px solid #BFDBFE; }
    .btn-del  { background: #FFF5F5; color: #EF4444; border: 1.5px solid #FEE2E2; }
    .memo-box { font-size: 13px; color: #64748B; background: #F8FAFC; border-radius: 6px; padding: 6px 10px; margin-top: 6px; }
    /* フィルター */
    .filter-bar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    @media (min-width: 769px) { .filter-bar { flex-direction: row; flex-wrap: wrap; align-items: center; } }
    .filter-bar input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid #CBD5E1; font-size: 16px; outline: none; background: #fff; -webkit-appearance: none; }
    @media (min-width: 769px) { .filter-bar input { width: auto; font-size: 13px; padding: 8px 12px; } }
    .btn-excel { padding: 12px 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: 1.5px solid #16A34A; background: #F0FDF4; color: #16A34A; width: 100%; }
    @media (min-width: 769px) { .btn-excel { width: auto; font-size: 13px; padding: 8px 12px; } }
    .btn-add { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg,#1E3A5F,#2563EB); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
    @media (min-width: 769px) { .btn-add { width: auto; margin-left: auto; font-size: 13px; padding: 8px 18px; } }
    .btn-refresh { padding: 12px 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: 1.5px solid #2563EB; background: #EFF6FF; color: #2563EB; width: 100%; }
    @media (min-width: 769px) { .btn-refresh { width: auto; font-size: 13px; padding: 8px 12px; } }
    /* モーダル: iOSで固定位置+スクロールの組み合わせが壊れるのでシンプルに */
    .modal-wrap { position: fixed; inset: 0; z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch; background: rgba(15,23,42,0.6); }
    .modal-box { background: #fff; width: 100%; max-width: 480px; margin: 0 auto; padding: 24px 16px 80px; min-height: 100vh; }
    @media (min-width: 769px) { .modal-box { border-radius: 16px; padding: 28px; min-height: auto; margin: 30px auto; } }
    /* 入力欄: iOS対策で全て16px以上・-webkit-appearance:none */
    .inp { display: block; width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #CBD5E1; font-size: 16px; font-family: 'Noto Sans JP', sans-serif; outline: none; background: #fff; -webkit-appearance: none; color: #1E293B; }
    .inp:focus { border-color: #2563EB; }
    @media (min-width: 769px) { .inp { padding: 10px 12px; font-size: 14px; border-radius: 8px; } }
    .lbl { display: block; font-size: 13px; color: #64748B; margin-bottom: 6px; font-weight: 600; }
    .fld { margin-bottom: 14px; }
    /* チェックボックス行: タップ領域を広く */
    .chk-row { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; border: 1.5px solid #E2E8F0; background: #F8FAFC; margin-bottom: 10px; cursor: pointer; -webkit-user-select: none; user-select: none; }
    .chk-row.active-blue   { border-color: #2563EB; background: #EFF6FF; }
    .chk-row.active-purple { border-color: #7C3AED; background: #F5F3FF; }
    .chk-row.disabled { opacity: 0.45; pointer-events: none; }
    .chk-lbl { font-size: 15px; font-weight: 600; color: #475569; flex: 1; line-height: 1.4; }
    .chk-lbl.blue   { color: #2563EB; }
    .chk-lbl.purple { color: #7C3AED; }
    .chk-note { font-size: 12px; font-weight: 400; margin-left: 6px; color: #94A3B8; }
    .chk-box { width: 24px; height: 24px; border-radius: 6px; border: 2px solid #CBD5E1; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chk-box.checked      { background: #2563EB; border-color: #2563EB; }
    .chk-box.checked-pur  { background: #7C3AED; border-color: #7C3AED; }
    .chk-tick { color: #fff; font-size: 14px; line-height: 1; }
    /* トースト */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1E3A5F; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 300; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  </style>
</head>

<div id="root"><div class="loading-screen"><div style="font-size:36px">⏳</div><div style="font-size:16px">読み込み中...</div></div></div>

<script>
/* ===== デバッグログ（画面で確認・コピー可能） ===== */
var _debugLog = [];
function dbg(msg) {
  var t = new Date().toLocaleTimeString('ja-JP');
  var entry = '[' + t + '] ' + msg;
  _debugLog.push(entry);
  if (_debugLog.length > 300) _debugLog.shift();
  console.log('[DBG]', msg);
  var pre = document.getElementById('dbg-pre');
  if (pre && pre.parentElement.style.display === 'flex') {
    pre.textContent = _debugLog.join('\n');
    pre.scrollTop = pre.scrollHeight;
  }
}
function showDebugViewer() {
  var v = document.getElementById('dbg-viewer');
  if (!v) {
    v = document.createElement('div');
    v.id = 'dbg-viewer';
    v.style.cssText = 'position:fixed;inset:16px;background:#1E293B;z-index:10000;border-radius:12px;display:none;flex-direction:column;box-shadow:0 0 50px rgba(0,0,0,0.5);';
    var bar = document.createElement('div');
    bar.style.cssText = 'display:flex;gap:8px;padding:10px;background:#0F172A;border-radius:12px 12px 0 0;align-items:center;';
    var title = document.createElement('span');
    title.textContent = '🔍 デバッグログ';
    title.style.cssText = 'color:#fff;font-size:14px;font-weight:700;flex:1;';
    var copyBtn = document.createElement('button');
    copyBtn.textContent = '📋 コピー';
    copyBtn.style.cssText = 'background:#2563EB;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;';
    copyBtn.onclick = function(){
      var txt = _debugLog.join('\n');
      if (navigator.clipboard) {
        navigator.clipboard.writeText(txt).then(function(){
          copyBtn.textContent = '✓ コピー済';
          setTimeout(function(){ copyBtn.textContent = '📋 コピー'; }, 2000);
        }).catch(function(){ alert(txt); });
      } else { alert(txt); }
    };
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '✕ 閉じる';
    closeBtn.style.cssText = 'background:#475569;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;';
    closeBtn.onclick = function(){ v.style.display = 'none'; };
    bar.appendChild(title); bar.appendChild(copyBtn); bar.appendChild(closeBtn);
    var pre = document.createElement('pre');
    pre.id = 'dbg-pre';
    pre.style.cssText = 'flex:1;margin:0;padding:12px;color:#94A3B8;font-family:monospace;font-size:11px;overflow:auto;white-space:pre-wrap;word-break:break-all;background:#1E293B;border-radius:0 0 12px 12px;';
    v.appendChild(bar); v.appendChild(pre);
    document.body.appendChild(v);
  }
  document.getElementById('dbg-pre').textContent = _debugLog.join('\n');
  v.style.display = 'flex';
  document.getElementById('dbg-pre').scrollTop = document.getElementById('dbg-pre').scrollHeight;
}
window.showDebugViewer = showDebugViewer;

/* ===== エラー表示（閉じる・詳細ボタン付き） ===== */
function showErr(msg) {
  var e = document.getElementById('err');
  if (!msg) { e.style.display = 'none'; e.innerHTML = ''; return; }
  e.style.display = 'block';
  var text = document.createElement('span');
  text.textContent = msg;
  text.style.cssText = 'flex:1;';
  var detail = document.createElement('button');
  detail.textContent = '詳細';
  detail.style.cssText = 'background:#991B1B;color:#fff;border:none;padding:4px 10px;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;margin-left:8px;flex-shrink:0;';
  detail.onclick = showDebugViewer;
  var close = document.createElement('button');
  close.textContent = '✕';
  close.style.cssText = 'background:transparent;border:none;color:#991B1B;font-size:18px;font-weight:700;cursor:pointer;padding:0 4px;margin-left:4px;flex-shrink:0;';
  close.onclick = function(){ e.style.display='none'; };
  e.innerHTML = '';
  e.style.cssText += ';display:flex;align-items:center;';
  e.appendChild(text); e.appendChild(detail); e.appendChild(close);
}
/* MSALの内部エラー（正常動作の一部）はユーザーに見せない */
var _MSAL_IGNORE = ['in_mem_redirect','storeAuthState','cookie','BrowserAuthError','interaction_in_progress','hash_empty_error','no_token_request_cache_error'];
function _isMsalNoise(msg) {
  if (!msg) return true;
  for (var i=0;i<_MSAL_IGNORE.length;i++) { if (msg.indexOf(_MSAL_IGNORE[i])>=0) return true; }
  return false;
}
window.onerror = function(m,s,l) {
  if (_isMsalNoise(m)) return true;
  dbg('window.onerror: ' + m);
  showErr('エラー: ' + m);
};
window.onunhandledrejection = function(ev) {
  var msg = String(ev.reason && ev.reason.message || ev.reason || '');
  if (_isMsalNoise(msg)) return;
  dbg('unhandledrejection: ' + msg);
  showErr('エラー: ' + msg);
};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js" onerror="showErr('MSALの読み込みに失敗しました')"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="showErr('Reactの読み込みに失敗しました')"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

/* ===== 設定 ===== */
const CLIENT_ID = "02da59cd-2903-4cdb-b519-4df3ecf79bcb";
const TENANT_ID = "f0796f06-778d-4183-b5d9-4cce701de452";
const SITE_NAME = "enjoint-kanri";
const SCOPES    = ["Sites.ReadWrite.All", "User.Read"];
const TYPES     = ["", "新規", "引き継ぎ"];
const COLS_D    = "130px 68px 54px 54px 62px minmax(90px,1fr) 56px 54px 106px minmax(90px,1fr) 66px 62px 56px 56px 52px";

/* ===== MSAL ===== */
let msalApp;
try {
  msalApp = new msal.PublicClientApplication({
    auth: {
      clientId: CLIENT_ID,
      authority: "https://login.microsoftonline.com/" + TENANT_ID,
      redirectUri: "https://enjointmasa.github.io/enjoint-list/",
    },
    cache: {
      cacheLocation: "localStorage",  // mobileのredirect後もセッション維持
      storeAuthStateInCookie: true,
    },
  });
  dbg("MSAL OK");
} catch(e) {
  showErr("MSAL初期化エラー: " + e.message);
}

/* ===== Graph API ===== */
async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) throw new Error("ログインが必要です");
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch(silentErr) {
    dbg("silent token fail: " + silentErr.message + " → popup試行");
    try {
      const r = await msalApp.acquireTokenPopup({ scopes: SCOPES, account: accounts[0] });
      return r.accessToken;
    } catch(popupErr) {
      dbg("popup fail: " + popupErr.message + " → redirect");
      // モバイルでpopupがブロックされた場合はredirectにフォールバック
      await msalApp.acquireTokenRedirect({ scopes: SCOPES, account: accounts[0] });
      throw new Error("認証のためリダイレクト中...");
    }
  }
}

async function graphFetch(token, path, opts = {}) {
  const method = opts.method || "GET";
  dbg("→ " + method + " " + path + (opts.body ? " body=" + String(opts.body).slice(0,200) : ""));
  let res;
  try {
    res = await fetch("https://graph.microsoft.com/v1.0" + path, {
      ...opts,
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    });
  } catch(networkErr) {
    dbg("✗ ネットワークエラー " + path + ": " + networkErr.message);
    throw new Error("ネットワークエラー [" + path + "]: " + networkErr.message);
  }
  if (method === "DELETE") {
    if (!res.ok) {
      const txt = await res.text().catch(()=>"");
      dbg("✗ DELETE失敗 " + path + " HTTP " + res.status + " " + txt);
      throw new Error("削除失敗 HTTP " + res.status + " [" + path + "]: " + txt.slice(0,200));
    }
    dbg("✓ DELETE OK " + path);
    return null;
  }
  const text = await res.text();
  let json;
  try { json = text ? JSON.parse(text) : {}; }
  catch(parseErr) {
    dbg("✗ JSONパース失敗 " + path + " HTTP " + res.status + " body=" + text.slice(0,200));
    throw new Error("JSONパース失敗 HTTP " + res.status + " [" + path + "]: " + text.slice(0,200));
  }
  if (!res.ok || json.error) {
    const msg = (json.error && (json.error.message || json.error.code)) || ("HTTP " + res.status);
    dbg("✗ " + method + " " + path + " HTTP " + res.status + ": " + msg);
    throw new Error(msg + " [" + path + "]");
  }
  dbg("✓ " + method + " " + path + " HTTP " + res.status);
  return json;
}

/* SharePointサイト・リストIDをキャッシュ */
let _siteId = null, _listId = null, _fieldMap = null;

async function ensureIds(token) {
  if (_siteId && _listId && _fieldMap) { dbg("ensureIds: キャッシュ済 site="+_siteId.slice(0,30)+" list="+_listId.slice(0,30)); return; }

  // ===== Step1: サイトを見つける =====
  let site = null;
  // 方法A: /sites/root でテナントのデフォルトSharePointホスト名を取得 → 名前で参照
  try {
    dbg("【サイト探索A】/sites/root でホスト名取得");
    const root = await graphFetch(token, `/sites/root?$select=id,webUrl`);
    const spHostname = new URL(root.webUrl).hostname;
    dbg("ホスト名: " + spHostname);
    site = await graphFetch(token, `/sites/${spHostname}:/sites/${SITE_NAME}?$select=id,webUrl,displayName,name`);
    dbg("【A】成功: " + site.webUrl);
  } catch(eA) {
    dbg("【A】失敗: " + eA.message);
    // 方法B: サイト検索
    try {
      dbg("【サイト探索B】/sites?search で検索");
      const searchRes = await graphFetch(token, `/sites?search=${encodeURIComponent(SITE_NAME)}`);
      const results = searchRes.value || [];
      dbg("検索ヒット " + results.length + "件: " + results.map(s=>(s.name||"?")+":"+(s.webUrl||"?")).join(" / "));
      site = results.find(s => s.name === SITE_NAME)
          || results.find(s => (s.webUrl||"").endsWith("/sites/" + SITE_NAME))
          || results.find(s => (s.displayName||"").includes(SITE_NAME))
          || results.find(s => (s.name||"").includes(SITE_NAME));
      if (!site) throw new Error("検索結果に '"+SITE_NAME+"' なし");
      dbg("【B】成功: " + site.webUrl);
    } catch(eB) {
      dbg("【B】失敗: " + eB.message);
      throw new Error("SharePointサイト '" + SITE_NAME + "' にアクセスできません。原因: " + eA.message + " / " + eB.message);
    }
  }
  _siteId = site.id;
  dbg("✓ siteId 確定: " + site.webUrl);

  // ===== Step2: リストを見つける =====
  const lists = await graphFetch(token, `/sites/${_siteId}/lists?$select=id,displayName,name`);
  const allLists = lists.value || [];
  dbg("リスト一覧(" + allLists.length + "件): " + allLists.map(l => l.displayName).join(" | "));
  // 候補名（柔軟マッチ）
  const targetNames = ["クライアント進捗確認リスト_相談","クライアント進捗確認リスト","受給者証・契約 対応状況確認表","受給者証・契約対応状況確認表"];
  let list = allLists.find(l => targetNames.indexOf(l.displayName) >= 0);
  if (!list) list = allLists.find(l => (l.displayName||"").indexOf("クライアント進捗") >= 0);
  if (!list) list = allLists.find(l => (l.displayName||"").indexOf("進捗確認") >= 0);
  if (!list) list = allLists.find(l => (l.displayName||"").indexOf("受給者証") >= 0);
  if (!list) list = allLists.find(l => (l.displayName||"").indexOf("対応状況") >= 0);
  // システムリスト除外
  const systemLists = ["Web テンプレートの拡張機能","ドキュメント","フォーム","スタイル ライブラリ"];
  if (!list) list = allLists.find(l => systemLists.indexOf(l.displayName) < 0);
  if (!list) throw new Error("SharePointリストが見つかりません。利用可能: " + allLists.map(l=>l.displayName).join(", "));
  _listId = list.id;
  dbg("✓ listId 確定: " + list.displayName);

  // ===== Step3: 列の内部名マップを作成 =====
  const cols = await graphFetch(token, `/sites/${_siteId}/lists/${_listId}/columns?$select=name,displayName,readOnly,hidden`);
  _fieldMap = {};
  (cols.value || []).forEach(c => {
    if (c.readOnly || c.hidden) return; // 読み取り専用・隠し列はスキップ
    _fieldMap[c.displayName] = c.name;
  });
  dbg("✓ 列マップ(" + Object.keys(_fieldMap).length + "個): " + JSON.stringify(_fieldMap));

  // 必須列の存在チェック（警告のみ・エラーにはしない）
  const required = ["名前","市町村","種別","契約予定日","契約完了","受給者証受取","AURA取込"];
  const missing = required.filter(n => !_fieldMap[n]);
  if (missing.length) dbg("⚠ 未マップ必須列: " + missing.join(", ") + " （列名がSharePointと不一致の可能性）");
}

function fName(displayName) {
  // 内部名が取れていればそれを使う、なければ表示名をそのまま
  return (_fieldMap && _fieldMap[displayName]) || displayName;
}

function itemToRecord(item) {
  const f = item.fields || {};
  // デバッグ: 最初のアイテムのフィールドを表示
  dbg("sample fields: " + Object.keys(f).slice(0,10).join(", "));
  return {
    id:           item.id,
    name:         f[fName("名前")]          || f.Title || f["名前"] || "",
    area:         f[fName("市町村")]         || f["市町村"] || "",
    type:         f[fName("種別")]           || f["種別"] || "",
    cityMeeting:  !!(f[fName("市役所面談")] ?? f["市役所面談"]),
    scheduleDate: f[fName("契約予定日")]     || f["契約予定日"] || "",
    memo1:        f[fName("備考①")]          || f["備考①"] || "",
    contracted:   !!(f[fName("契約完了")]    ?? f["契約完了"]),
    changeNotice: !!(f[fName("変更届")]      ?? f["変更届"]),
    planApp:      !!(f[fName("計画案等提出")]?? f["計画案等提出"]),
    memo2:        f[fName("備考②")]          || f["備考②"] || "",
    received:     !!(f[fName("受給者証受取")]?? f["受給者証受取"]),
    meetingHeld:  f[fName("担当者会議日程")] || f["担当者会議日程"] || "",
    planSubmit:   !!(f[fName("計画書提出")] ?? f["計画書提出"]),
    aura:         !!(f[fName("AURA取込")]    ?? f["AURA取込"]),
  };
}

function recordToFields(r) {
  const m = {};
  m["Title"] = r.name || "";
  // 内部名マッピング済みの列のみ設定（未マップ列はスキップ）
  function setField(displayName, value) {
    if (!_fieldMap) return;
    const internal = _fieldMap[displayName];
    if (!internal) { dbg("未マップ列: " + displayName); return; }
    if (internal === "Title") return; // Title は上で設定済み
    m[internal] = value;
  }
  setField("名前",          r.name || "");
  setField("市町村",         r.area || "");
  setField("種別",           r.type || "");
  setField("市役所面談",     !!r.cityMeeting);
  setField("契約予定日",     r.scheduleDate || "");
  setField("備考①",          r.memo1 || "");
  setField("契約完了",       !!r.contracted);
  setField("変更届",         !!r.changeNotice);
  setField("計画案等提出",   !!r.planApp);
  setField("備考②",          r.memo2 || "");
  setField("受給者証受取",   !!r.received);
  setField("担当者会議日程", r.meetingHeld || "");
  setField("計画書提出",     !!r.planSubmit);
  setField("AURA取込",       !!r.aura);
  dbg("送信fields: " + JSON.stringify(m));
  return m;
}

async function fetchItems(token) {
  await ensureIds(token);
  const d = await graphFetch(token, `/sites/${_siteId}/lists/${_listId}/items?expand=fields&$top=500`);
  return (d.value || []).map((item, i) => { if(i===0) dbg("first item fields: "+JSON.stringify(Object.keys(item.fields||{}))); return itemToRecord(item); });
}

async function createItem(token, record) {
  await ensureIds(token);
  return graphFetch(token, `/sites/${_siteId}/lists/${_listId}/items`, {
    method: "POST", body: JSON.stringify({ fields: recordToFields(record) })
  });
}

async function updateItem(token, itemId, record) {
  await ensureIds(token);
  return graphFetch(token, `/sites/${_siteId}/lists/${_listId}/items/${itemId}/fields`, {
    method: "PATCH", body: JSON.stringify(recordToFields(record))
  });
}

async function deleteItem(token, itemId) {
  await ensureIds(token);
  return graphFetch(token, `/sites/${_siteId}/lists/${_listId}/items/${itemId}`, { method: "DELETE" });
}

/* ===== UIコンポーネント ===== */
function useIsMobile() {
  const [v, setV] = useState(window.innerWidth <= 768);
  useEffect(() => {
    const h = () => setV(window.innerWidth <= 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return v;
}

/* チェックボックス行（ネイティブcheckboxを使わずdivでタップ制御） */
function ChkRow({ checked, onChange, disabled, purple, label, note }) {
  const boxCls = "chk-box" + (checked ? (purple ? " checked-pur" : " checked") : "");
  const rowCls = "chk-row" + (disabled ? " disabled" : checked ? (purple ? " active-purple" : " active-blue") : "");
  const lblCls = "chk-lbl" + (checked && !disabled ? (purple ? " purple" : " blue") : "");
  return (
    <div className={rowCls} onClick={() => !disabled && onChange(!checked)}>
      <div className={boxCls}>{checked && <span className="chk-tick">✓</span>}</div>
      <span className={lblCls}>{label}{note && <span className="chk-note">{note}</span>}</span>
    </div>
  );
}

function App() {

  const [records,  setRecords]    = useState([]);
  const [loading,  setLoading]    = useState(false);
  const [saving,   setSaving]     = useState(false);
  const [modal,    setModal]      = useState(null);
  const [toast,    setToast]      = useState("");
  const [filterName,  setFilterName]  = useState("");
  const [filterArea,  setFilterArea]  = useState("");
  const [filterMonth, setFilterMonth] = useState("");

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""), 3000); };
  const showError = msg => { dbg("❌ ERROR: " + msg); showErr(msg); showToast("⚠️ " + msg.substring(0, 40)); };

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      const token = await getToken();
      const items = await fetchItems(token);
      setRecords(items);
      showErr(""); // 成功したら前のエラーをクリア
      dbg("loaded " + items.length + " items");
    } catch(e) {
      showError("データ読み込みエラー: " + e.message);
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    (async () => {
      try {
        // リダイレクト認証後の処理（戻り値でアカウントを取得）
        const result = await msalApp.handleRedirectPromise();
        const account = result ? result.account : (msalApp.getAllAccounts()[0] || null);
        dbg("auth result: " + (result?"redirect":"silent") + " account:" + (account?account.username:"none"));
        if (account) {
          setUserName(account.name || account.username || "");
          setAuthState("app");
          await loadData();
        } else {
          setAuthState("login");
        }
      } catch(e) {
        dbg("auth error: " + e.message);
        setAuthState("login");
      }
    })();
  }, []);

  const [loginLoading, setLoginLoading] = useState(false);
  const handleLogin = async () => {
    setLoginLoading(true);
    try {
      await msalApp.loginRedirect({ scopes: SCOPES });

    } catch(e) {
      setLoginLoading(false);
      showError("ログインエラー: " + e.message);
    }
  };

  const handleLogout = () => msalApp.logoutRedirect();

  const handleSave = async form => {
    setSaving(true);
    try {
      const token = await getToken();
      if (modal === "new") {
        const res = await createItem(token, form);
        setRecords(prev => [...prev, { ...form, id: res.id || res.fields?.id || String(Date.now()) }]);
        showToast("✓ 追加しました");
      } else {
        await updateItem(token, modal.id, form);
        setRecords(prev => prev.map(r => r.id === modal.id ? { ...form, id: r.id } : r));

    setSaving(false);
  };

    try {

          <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
            {[["対象者",total,"rgba(255,255,255,0.15)"],["契約完了",cont,"rgba(110,231,183,0.25)"],["受取済",recv,"rgba(110,231,183,0.25)"],["担当者会議",meet,"rgba(196,181,253,0.3)"],["AURA取込",aura,"rgba(147,197,253,0.3)"]].map(([l,v,bg])=>(
              <div key={l} style={{ background:bg, borderRadius:10, padding:"6px 14px", textAlign:"center" }}>
                <div style={{ fontSize:20, fontWeight:700 }}>{v}</div>
                <div style={{ fontSize:11, opacity:0.85 }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* コンテンツ */}
      <div style={{ maxWidth:1500, margin:"0 auto", padding:isMobile?"12px 12px 40px":"14px 12px 40px" }}>
        <div className="filter-bar">
          <input value={filterName}  onChange={e=>setFilterName(e.target.value)}  placeholder="🔍 名前で検索" autoComplete="off" />
          <input value={filterArea}  onChange={e=>setFilterArea(e.target.value)}  placeholder="🗺 市町村で検索" autoComplete="off" />
          <input value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} placeholder="📅 契約月 例:5" autoComplete="off" />
          <button onClick={exportExcel} className="btn-excel">📥 Excel出力</button>
          <button onClick={loadData}    className="btn-refresh">🔄 更新</button>
          <button onClick={()=>setModal("new")} className="btn-add">＋ 新規追加</button>
        </div>

        {loading && <div style={{ textAlign:"center", padding:32, color:"#94A3B8", fontSize:16 }}>読み込み中...</div>}

        {/* モバイル カード */}
        <div className="mobile-only">
          {!loading && filtered.length===0 && <div style={{ padding:32, textAlign:"center", color:"#94A3B8", background:"#fff", borderRadius:14, fontSize:16 }}>該当なし</div>}
          {filtered.map(r => <RecordCard key={r.id} r={r} onEdit={()=>setModal(r)} onDelete={()=>handleDelete(r.id)} />)}
        </div>

        {/* デスクトップ テーブル */}
        <div className="desktop-only" style={{ borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.08)", overflowX:"auto" }}>
          <div style={{ minWidth:1100 }}>
            <div style={{ display:"grid", gridTemplateColumns:COLS_D, background:"#1E3A5F", padding:"0 8px" }}>
              {HDR.map((h,i)=>(
                <div key={i} style={{ padding:"9px 4px", textAlign:"center", whiteSpace:"pre-line", lineHeight:1.35, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:"#CBD5E1" }}>
                  <span>{h.l}</span>
                  {h.n&&<span style={{ fontSize:9, color:h.nc, fontWeight:700, marginTop:1 }}>▶{h.n}</span>}
                </div>
              ))}
            </div>
            {!loading && filtered.length===0 && <div style={{ padding:32, textAlign:"center", color:"#94A3B8", background:"#fff" }}>該当なし</div>}
            {filtered.map((r,i)=>{
              const done=r.contracted&&r.received&&r.aura, isHK=r.type==="引き継ぎ", isSN=r.type==="新規";
              return (
                <div key={r.id} style={{ display:"grid", gridTemplateColumns:COLS_D, padding:"8px", alignItems:"start", borderBottom:"1px solid #F1F5F9", background:done?"#F0FDF4":i%2===0?"#fff":"#FAFBFC" }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"#1E293B", paddingTop:2 }}>{r.name}</span>
                  <span style={{ fontSize:12, color:"#475569", paddingTop:2 }}>{r.area}</span>
                  <div style={{ paddingTop:1 }}><span style={{ fontSize:11, fontWeight:700, color:r.type==="新規"?"#2563EB":r.type==="引き継ぎ"?"#7C3AED":"#CBD5E1", background:r.type==="新規"?"#EFF6FF":r.type==="引き継ぎ"?"#F5F3FF":"transparent", borderRadius:6, padding:r.type?"2px 4px":0, display:"inline-block" }}>{r.type||"—"}</span></div>
                  <div style={{ paddingTop:3 }}><DisplayCheck checked={r.cityMeeting} disabled={!isSN} /></div>
                  <span style={{ fontSize:12, color:"#64748B", textAlign:"center", paddingTop:2 }}>{r.scheduleDate}</span>
                  <span style={{ fontSize:12, color:"#64748B", whiteSpace:"pre-wrap", wordBreak:"break-all" }}>{r.memo1}</span>
                  <div style={{ paddingTop:3 }}><DisplayCheck checked={r.contracted} /></div>
                  <div style={{ paddingTop:3 }}><DisplayCheck checked={r.changeNotice} disabled={!isHK} /></div>
                  <div style={{ paddingTop:3 }}><DisplayCheck checked={r.planApp} disabled={!isSN} /></div>
                  <span style={{ fontSize:12, color:"#64748B", whiteSpace:"pre-wrap", wordBreak:"break-all" }}>{r.memo2}</span>
                  <div style={{ paddingTop:3 }}><DisplayCheck checked={r.received} /></div>
                  <div style={{ paddingTop:3, display:"flex", justifyContent:"center" }}>{isSN?<span style={{ fontSize:12, color:r.meetingHeld?"#64748B":"#CBD5E1" }}>{r.meetingHeld||"—"}</span>:<span style={{ fontSize:11, color:"#D1D5DB" }}>—</span>}</div>
                  <div style={{ paddingTop:3 }}><DisplayCheck checked={r.planSubmit} disabled={!isSN} /></div>
                  <div style={{ paddingTop:3 }}><DisplayCheck checked={r.aura} /></div>
                  <span style={{ display:"flex", gap:4, paddingTop:1 }}>
                    <button onClick={()=>setModal(r)} style={{ padding:"5px 8px", borderRadius:6, border:"1px solid #BFDBFE", background:"#EFF6FF", cursor:"pointer", fontSize:14 }}>✏️</button>
                    <button onClick={()=>handleDelete(r.id)} style={{ padding:"5px 8px", borderRadius:6, border:"1px solid #FEE2E2", background:"#FFF5F5", cursor:"pointer", fontSize:14 }}>🗑</button>
                  </span>
                </div>
              );
            })}
          </div>
        </div>

        <p style={{ textAlign:"center", fontSize:13, color:"#94A3B8", marginTop:12 }}>
          {filtered.length}件表示 / 全{records.length}件　｜　データはSharePointに保存されます
        </p>
      </div>

      {modal && <Modal record={modal==="new"?null:modal} onClose={()=>setModal(null)} onSave={handleSave} saving={saving} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
